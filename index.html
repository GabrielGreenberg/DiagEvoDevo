<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagram Evolver</title>
    <style>
      :root {
        --bg: #0e1016;
        --panel: #171a23;
        --panel2: #1e2230;
        --ink: #e6e7ee;
        --muted: #8b90a3;
        --line: #2a2f3d;
        --accent: #5b8cff;
        --ord: #f2a65a;
        --int: #6ad0a8;
        --ratio: #5b8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg); color: var(--ink);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      .muted { color: var(--muted); font-weight: 400; }

      .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 16px;
        padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
        flex-wrap: wrap;
      }
      .title { font-weight: 700; font-size: 15px; }
      .controls { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
      .seeds, .runbtns { display: flex; align-items: center; gap: 8px; }
      .seeds label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }
      .seedinput {
        width: 74px; background: var(--panel2); color: var(--ink);
        border: 1px solid var(--line); border-radius: 6px; padding: 3px 6px; font: inherit; font-size: 12px;
      }
      .stepsinput { width: 92px; } /* five-digit caps (e.g. 10000+) fit comfortably */
      button {
        background: var(--panel2); color: var(--ink); border: 1px solid var(--line);
        border-radius: 6px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer;
      }
      button:hover { border-color: #3a4055; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
      .spacer { width: 10px; }

      .main { display: flex; flex: 1; min-height: 0; }
      .figpane { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 12px; }
      #figcanvas {
        flex: 1; width: 100%; min-height: 0; border-radius: 10px;
        background: radial-gradient(1200px 600px at 30% 20%, #141824, #0d0f16);
        border: 1px solid var(--line);
      }
      .caption { padding: 8px 4px 0; font-size: 12px; }

      /* trajectory GALLERY: one thumbnail per trajectory ever started (endpoints included);
         horizontal scroll on overflow. Click = sticky selection (accent border, does not move on
         its own); ★ = current best by exact total (subtle, may move). */
      .trajstrip { display: flex; gap: 8px; padding-top: 8px; overflow-x: auto; }
      .traj, .refcell {
        flex: 0 0 auto; width: 128px; border: 1px solid var(--line); border-radius: 8px;
        background: var(--panel); padding: 4px; cursor: pointer;
      }
      .traj:hover, .refcell:hover { border-color: #3a4055; }
      .traj.selected, .refcell.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
      .traj.best .tscore::after { content: ' ★'; color: var(--ord); font-size: 9px; }
      /* the permanent REFERENCE cell (hand-built golden bars): dashed = benchmark, not evolved.
         Its "bars" badge (.rbadge) replaces the status badge + kind tag — it never runs. */
      .refcell { border-style: dashed; }
      .rbadge {
        border-radius: 4px; padding: 0 4px; font-size: 9px; text-transform: uppercase;
        letter-spacing: 0.03em; background: rgba(139,144,163,0.18); color: var(--muted);
      }
      .trajcanvas { width: 118px; height: 78px; display: block; background: #0d0f16; border-radius: 5px; }
      .trajmeta { display: flex; align-items: center; gap: 5px; padding-top: 3px; font-size: 10px; font-family: ui-monospace, monospace; }
      .tscore { font-weight: 600; }
      .tbadge { border-radius: 4px; padding: 0 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.03em; }
      .tbadge.running { background: rgba(91,140,255,0.18); color: var(--accent); }
      .tbadge.plateaued { background: rgba(106,208,168,0.18); color: var(--int); }
      .tbadge.capped { background: rgba(242,166,90,0.18); color: var(--ord); }
      .tkind { margin-left: auto; }

      .sidepane {
        width: 380px; border-left: 1px solid var(--line); background: var(--panel);
        overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px;
      }
      .panel { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
      .panel h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; }

      .dtable { display: flex; flex-direction: column; gap: 3px; }
      .drow { display: grid; grid-template-columns: 18px 1fr 62px; align-items: center; gap: 8px; }
      .dlabel { font-family: ui-monospace, monospace; color: var(--muted); }
      .dbartrack { height: 12px; background: #0e1016; border-radius: 3px; overflow: hidden; }
      .dbar { display: block; height: 100%; background: linear-gradient(90deg, #3b6, #6ad0a8); }
      .dval { text-align: right; font-family: ui-monospace, monospace; font-size: 12px; }

      /* READINGS strip (carrier toggles): chip = one distinct carrier; .off = excluded from the
         NEXT session's census; .pending = differs from the LIVE session's objective. */
      .readings summary { cursor: pointer; display: flex; align-items: baseline; gap: 8px; list-style: none; }
      .readings summary::before { content: '▸'; color: var(--muted); font-size: 10px; }
      .readings[open] summary::before { content: '▾'; }
      .readings summary h3 { display: inline; margin: 0; font-size: 13px; font-weight: 600; }
      .rhint { font-size: 10px; margin: 6px 0 2px; }
      .pendhint {
        margin-left: auto; font-size: 10px; color: var(--ord);
        border: 1px solid rgba(242,166,90,0.4); border-radius: 4px; padding: 0 5px;
      }
      .rgroup { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
      .rgname { flex: 0 0 76px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
      .chip {
        font-size: 11px; padding: 1px 7px; border-radius: 10px;
        background: rgba(91,140,255,0.14); border: 1px solid rgba(91,140,255,0.35); color: var(--ink);
      }
      .chip:hover { border-color: var(--accent); }
      .chip.off { background: transparent; border-color: var(--line); color: var(--muted); text-decoration: line-through; opacity: 0.6; }
      .chip.pending { box-shadow: 0 0 0 1px var(--ord); }

      /* REINFORCEMENT mini-panel (matches toggle / coincidence 3-state selector): reuses the
         readings chip semantics (.off = off next session, .pending = differs from the LIVE
         objective). Coincidence mode chips are EXCLUSIVE alternatives — an unselected mode is
         not an "excluded" thing, so no strike-through on those. */
      .reinforce .rgname { flex-basis: 40px; }
      .reinforce .cmode.off { text-decoration: none; }

      /* coincidence bonus row (mirrors .penrow) + per-relation "coincident:" pair lines */
      .bonusrow .bval { margin-left: auto; font-family: ui-monospace, monospace; color: var(--int); }
      .coinline { font-size: 10px; margin-top: 4px; }

      .scoretop { display: flex; gap: 20px; margin-bottom: 8px; }
      .bignum { display: flex; flex-direction: column; }
      .biglabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
      .bigval { font-size: 22px; font-weight: 700; font-family: ui-monospace, monospace; }
      .qualtrack { height: 6px; background: #0e1016; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
      .qualbar { display: block; height: 100%; background: linear-gradient(90deg, var(--ord), var(--int), var(--ratio)); transition: width 0.1s; }

      .comphdr { font-size: 11px; margin: 6px 0 2px; }
      .assign { margin: 10px 0; padding-top: 8px; border-top: 1px solid var(--line); }
      .ahead { font-size: 12px; margin-bottom: 6px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
      .ahead .muted { font-size: 11px; }
      .areward { margin-left: auto; font-family: ui-monospace, monospace; color: var(--muted); }
      /* per-carrier rows (v2): label · salience chip · per-rung mini-bars · cell q */
      .crow { display: grid; grid-template-columns: 92px 30px 1fr 34px; align-items: center; gap: 6px; margin: 4px 0; }
      .crow.dim { opacity: 0.42; } /* below reader resolution (salience gate) */
      .cname { font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cbadge {
        margin-left: 4px; font-size: 9px; color: var(--muted); border: 1px solid var(--line);
        border-radius: 4px; padding: 0 3px; vertical-align: 1px; white-space: nowrap;
      }
      .salchip {
        font-family: ui-monospace, monospace; font-size: 10px; text-align: center;
        background: #0e1016; border-radius: 4px; padding: 1px 0; color: var(--muted);
      }
      .rungbars { display: flex; gap: 4px; min-width: 0; }
      .minibar { position: relative; flex: 1; height: 12px; background: #0e1016; border-radius: 3px; overflow: hidden; }
      .minifill { position: absolute; inset: 0 auto 0 0; transition: width 0.1s; opacity: 0.65; }
      .minitxt {
        position: absolute; inset: 0; font: 9px/12px ui-monospace, monospace;
        text-align: center; color: var(--ink); white-space: nowrap;
      }
      .rung-ord { background: var(--ord); }
      .rung-int { background: var(--int); }
      .rung-ratio { background: var(--ratio); }
      .cq { text-align: right; font-family: ui-monospace, monospace; font-size: 11px; }
      .penrow { display: flex; gap: 8px; margin-top: 8px; font-size: 11px; border-top: 1px solid var(--line); padding-top: 8px; }
      .penrow .pval { margin-left: auto; font-family: ui-monospace, monospace; color: var(--ord); }
      .statusrow { margin-top: 10px; font-size: 11px; border-top: 1px solid var(--line); padding-top: 8px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
