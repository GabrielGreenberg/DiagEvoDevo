<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagram Evolver</title>
    <style>
      :root {
        --bg: #0e1016;
        --panel: #171a23;
        --panel2: #1e2230;
        --ink: #e6e7ee;
        --muted: #8b90a3;
        --line: #2a2f3d;
        --accent: #5b8cff;
        --ord: #f2a65a;
        --int: #6ad0a8;
        --ratio: #5b8cff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg); color: var(--ink);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app { display: flex; flex-direction: column; height: 100vh; }
      .muted { color: var(--muted); font-weight: 400; }

      .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 16px;
        padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
        flex-wrap: wrap;
      }
      .title { font-weight: 700; font-size: 15px; }
      .controls { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
      .seeds, .runbtns { display: flex; align-items: center; gap: 8px; }
      .seeds label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }
      .seedinput {
        width: 74px; background: var(--panel2); color: var(--ink);
        border: 1px solid var(--line); border-radius: 6px; padding: 3px 6px; font: inherit; font-size: 12px;
      }
      button {
        background: var(--panel2); color: var(--ink); border: 1px solid var(--line);
        border-radius: 6px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer;
      }
      button:hover { border-color: #3a4055; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
      .spacer { width: 10px; }

      .main { display: flex; flex: 1; min-height: 0; }
      .figpane { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 12px; }
      #figcanvas {
        flex: 1; width: 100%; min-height: 0; border-radius: 10px;
        background: radial-gradient(1200px 600px at 30% 20%, #141824, #0d0f16);
        border: 1px solid var(--line);
      }
      .caption { padding: 8px 4px 0; font-size: 12px; }

      .sidepane {
        width: 380px; border-left: 1px solid var(--line); background: var(--panel);
        overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px;
      }
      .panel { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
      .panel h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; }

      .dtable { display: flex; flex-direction: column; gap: 3px; }
      .drow { display: grid; grid-template-columns: 18px 1fr 62px; align-items: center; gap: 8px; }
      .dlabel { font-family: ui-monospace, monospace; color: var(--muted); }
      .dbartrack { height: 12px; background: #0e1016; border-radius: 3px; overflow: hidden; }
      .dbar { display: block; height: 100%; background: linear-gradient(90deg, #3b6, #6ad0a8); }
      .dval { text-align: right; font-family: ui-monospace, monospace; font-size: 12px; }

      .scoretop { display: flex; gap: 20px; margin-bottom: 8px; }
      .bignum { display: flex; flex-direction: column; }
      .biglabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
      .bigval { font-size: 22px; font-weight: 700; font-family: ui-monospace, monospace; }
      .qualtrack { height: 6px; background: #0e1016; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
      .qualbar { display: block; height: 100%; background: linear-gradient(90deg, var(--ord), var(--int), var(--ratio)); transition: width 0.1s; }

      .comphdr { font-size: 11px; margin: 6px 0 2px; }
      .assign { margin: 10px 0; padding-top: 8px; border-top: 1px solid var(--line); }
      .ahead { font-size: 12px; margin-bottom: 6px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
      .ahead .muted { font-size: 11px; }
      .areward { margin-left: auto; font-family: ui-monospace, monospace; color: var(--muted); }
      .rrow { display: grid; grid-template-columns: 96px 1fr 44px; align-items: center; gap: 8px; margin: 3px 0; }
      .rname { font-size: 12px; color: var(--muted); }
      .rtrack { height: 10px; background: #0e1016; border-radius: 3px; overflow: hidden; }
      .rbar { display: block; height: 100%; transition: width 0.1s; }
      .rung-ord { background: var(--ord); }
      .rung-int { background: var(--int); }
      .rung-ratio { background: var(--ratio); }
      .rval { text-align: right; font-family: ui-monospace, monospace; font-size: 12px; }
      .penrow, .statusrow { margin-top: 10px; font-size: 11px; }
      .statusrow { border-top: 1px solid var(--line); padding-top: 8px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
