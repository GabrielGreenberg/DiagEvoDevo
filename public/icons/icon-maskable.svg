  <rect x="160" y="300" width="36" height="60"  rx="8" fill="#f2a65a"/>
  <rect x="212" y="264" width="36" height="96"  rx="8" fill="#6ad0a8"/>
  <rect x="264" y="224" width="36" height="136" rx="8" fill="#5b8cff"/>
  <rect x="316" y="188" width="36" height="172" rx="8" fill="#e6e7ee"/>
  <rect x="150" y="360" width="212" height="9" rx="4.5" fill="#2a2f3d"/>
</svg>
