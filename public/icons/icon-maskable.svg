<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable variant: full-bleed background, content kept inside the central ~60% safe zone
       so platform masks (circle/squircle) never clip the glyph. -->
